<!doctype html>
<html lang="it">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Single Page Application</title>
    <link rel="stylesheet" href="css/styles.css" />
    <link
      rel="stylesheet"
      href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.css"
    />
  </head>
  <body>
    <div class="pagina">
      <div class="parte-sinistra" id="sidebar">
        <div class="parte-sinistra-alto">
          <h2>la tua gmail</h2>
        </div>

        <div class="parte-sinistra-basso">
          <aside>
            <div class="barra-di-ricerca">
              <input type="text" placeholder="Cerca..." />
              <button><i class="bi bi-search"></i></button>
            </div>

            <nav>
              <a href="#anagrafiche">
                <i class="bi bi-people"></i>
                <span>Anagrafiche</span>
              </a>

              <a href="#contabilita">
                <i class="bi bi-calculator"></i>
                <span>Contabilità</span>
              </a>

              <a href="#magazzino">
                <i class="bi bi-box-seam"></i>
                <span>Magazzino</span>
              </a>

              <a href="#vendite">
                <i class="bi bi-graph-up"></i>
                <span>Vendite</span>
              </a>

              <a href="#acquisti">
                <i class="bi bi-cart"></i>
                <span>Acquisti</span>
              </a>

              <a href="#risorse-umane">
                <i class="bi bi-person-badge"></i>
                <span>Risorse Umane</span>
              </a>

              <a href="#settings">
                <i class="bi bi-gear"></i>
                <span>Impostazioni</span>
              </a>

              <a href="#logout">
                <i class="bi bi-box-arrow-right"></i>
                <span>Logout</span>
              </a>
            </nav>
          </aside>
        </div>

        <div class="parte-sinistra-footer">
          <button id="toggle-sidebar">
            <i class="bi bi-layout-sidebar-inset"></i>
            <span>Comprimi</span>
          </button>
        </div>
      </div>

      <div class="parte-destra">
        <div class="parte-destra-alto">
          <nav>
            <a href="askAi">ask AI</a>
            <a href="#account">Account</a>
            <a href="support"><i class="bi bi-question-circle"></i> Support</a>
          </nav>
        </div>

        <div>
          <main>
            <h1>Benvenuto nella tua Single Page Application</h1>
            <p>
              Qui puoi visualizzare i tuoi dati, gestire le tue attività e
              accedere a tutte le funzionalità della tua applicazione.
            </p>
          </main>
        </div>
      </div>
    </div>

    <script>
      const bottone = document.getElementById("toggle-sidebar");
      const sidebar = document.getElementById("sidebar");

      bottone.addEventListener("click", function () {
        sidebar.classList.toggle("collapsed");
      });
    </script>
  </body>
</html>
